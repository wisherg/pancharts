name: Publish Python Package

# 触发条件：创建 Release 或推送 v 开头的 Tag 时触发（保留你原来的触发规则）
on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # 关键1：Trusted Publisher 需要明确的 ID 令牌权限（OIDC 授权核心）
    permissions:
      id-token: write  # 必须开启，用于向 PyPI 证明身份
      contents: read   # 读取仓库代码（基础权限）
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    
    - name: Build package
      run: python -m build
    
    - name: Publish to PyPI (Trusted Publisher 模式)
      uses: pypa/gh-action-pypi-publish@release/v1
      # 关键2：移除 password 配置，仅保留仓库地址（Trusted Publisher 无需 Token）
      with:
        repository-url: https://upload.pypi.org/legacy/
